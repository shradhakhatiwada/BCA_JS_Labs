<!--Write a program to display the multiplication table of any number
 using a prompt dialogue box.-->
 <!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>

    <script>
        function showTable() {
            // Take input from user
            let number = parseInt(prompt("Enter a number to display its multiplication table:"));

            // Validate input
            if (isNaN(number)) {
                alert("Please enter a valid number.");
                return;
            }

            // Generate multiplication table
            let result = "Multiplication Table of " + number + ":\n\n";

            for (let i = 1; i <= 10; i++) {
                result += number + " x " + i + " = " + (number * i) + "\n";
            }

            // Display result
            alert(result);
        }
    </script>
</head>

<body>

    <h2>Multiplication Table Generator</h2>
    <button onclick="showTable()">Generate Table</button>

</body>
</html>
<!-- KEY CONCEPTS:
- prompt() → to take user input         
- parseInt() → convert input into integer
- for loop runs from 1 to 10
- Each iteration calculates number × i
- Results are stored in a string and displayed using alert() -->
