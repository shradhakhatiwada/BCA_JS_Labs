<!DOCTYPE html>
<html>
<head>
    <title>Find Duplicates</title>
</head>
<body>

<h2>Find Duplicate Values</h2>

<button onclick="findDuplicates()">Find Duplicates</button>

<p id="result"></p>

<script>
function findDuplicates() {

    let arr = [1, 2, 3, 4, 2, 5, 3, 6];

    let duplicates = [];

    for (let i = 0; i < arr.length; i++) {

        if (
            arr.indexOf(arr[i]) !== i &&
            duplicates.indexOf(arr[i]) === -1
        ) {
            duplicates.push(arr[i]);
        }
    }

    document.getElementById("result").innerHTML =
        "Duplicate values: " + duplicates.join(", ");
}

//2. Write a JS code to find duplicate values in a given array.
</script>

</body>
</html>
