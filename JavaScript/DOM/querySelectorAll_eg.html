<!DOCTYPE html>
<html>
<body>
<h1>JavaScript HTML DOM</h1>
<h2>The querySelectorAll() Method</h2>

<p class="demo">One</p>
<p class="demo">Two</p>

<script>
// Access a paragraph Element
const myItems = document.querySelectorAll(".demo");

// Change the content of the Element
myItems[0].innerHTML = "First";
</script>

</body>
</html>
